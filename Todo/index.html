<!DOCTYPE html>
<html>

<head>
    <title>TO DO</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>TO DO List</h1>
    <div id="todo-list">

        <div class="todo-container">
            <div class="todo">
                <div class="check-box"></div>
                <div class="content">
                    <p>started the task</p>
                </div>
            </div>
            <button type="button">EDIT</button>
            <div class="edit">
                <input type="text" name="" id="new-todo">
                <button type="button">UPDATE</button>
            </div>
        </div>

        <div class="todo-container">
            <div class="todo">
                <div class="check-box"></div>
                <div class="content">
                    <p>ended the task</p>
                </div>
            </div>
            <button type="button">EDIT</button>
            <div class="edit">
                <input type="text"id="new-todo">
                <button type="button">
                    UPDATE
                </button>
            </div>
        </div>

    </div>
    
    <div id="add-todo">
            <input type="text" id="new-todo">
            <button type="button">
                Add TODO
            </button>
    </div>
    
    <script src="script.js"></script>
</body>

</html>
