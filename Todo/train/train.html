<!DOCTYPE html>
<html>
<head>
    <title>GET Form Example</title>
</head>
<body>
    <h2>Search Form</h2>
    <form method="get" action="/search">
        <label>Search Query:</label>
        <input type="text" name="query" required>
        <input type="submit" value="Search">
    </form>
</body>
</html>
