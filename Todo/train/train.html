<!-- templates/form.html -->
<!DOCTYPE html>
<html>
<head>
    <title>POST Form Example</title>
</head>
<body>
    <h2>Contact Form</h2>
    <form method="post" action="/submit">
        <label>Name:</label>
        <input type="text" name="name" required><br><br>

        <label>Email:</label>
        <input type="email" name="email" required><br><br>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
